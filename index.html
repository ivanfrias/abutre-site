<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Metal+Mania&family=Inter:wght@400;700&display=swap');
        .font-metal { font-family: 'Metal+Mania', cursive; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Hero Section -->
    <section class="relative h-screen flex items-end justify-center pb-20">
        <!-- Replace with your actual band photo URL -->
        <div class="absolute inset-0 bg-gray-900 bg-cover bg-center" style="background-image: url('your-band-hero-photo.jpg');"></div>
        <div class="absolute inset-0 hero-gradient"></div>
        
        <div class="relative z-10 text-center">
            <h1 class="text-8xl md:text-9xl font-metal uppercase tracking-widest text-red-600 drop-shadow-2xl">Abutre</h1>
            <p class="text-xl tracking-[0.5em] uppercase text-white mt-4">Traditional Heavy Metal</p>
        </div>
    </section>

    <!-- Main Content Grid (Maiden Style) -->
    <main class="max-w-6xl mx-auto px-6 -mt-20 relative z-20">
        <div class="grid md:grid-cols-3 gap-6">
            
            <!-- News/Tour Card -->
            <div class="md:col-span-2 bg-gray-900 border border-gray-700 p-8 hover:border-red-600 transition-all">
                <h2 class="text-3xl font-bold uppercase mb-6 border-b border-gray-700 pb-2">Upcoming Rituals</h2>
                <div id="tour-list" class="text-gray-400">
                    <p>No upcoming dates scheduled.</p>
                </div>
            </div>

            <!-- Discography/CTA Card -->
            <div class="bg-red-900 p-8 text-white flex flex-col justify-center items-center text-center">
                <h3 class="text-2xl font-bold uppercase mb-4">Latest Release</h3>
                <div class="w-32 h-32 bg-black mb-4 border-2 border-white"></div>
                <a href="#" class="bg-black px-6 py-2 uppercase tracking-widest font-bold hover:bg-white hover:text-black transition-all">Listen Now</a>
            </div>
        </div>

        <!-- Members Section -->
        <section class="py-20">
            <h2 class="text-4xl font-bold uppercase mb-12 text-center">The Lineup</h2>
            <div id="members-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6">
                <!-- JS will inject cards here -->
            </div>
        </section>
    </main>

    <script>
        // Fetch members
        fetch('data/members.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('members-grid');
                data.forEach(m => {
                    grid.innerHTML += `
                        <div class="group cursor-pointer">
                            <div class="w-full h-64 bg-gray-800 grayscale group-hover:grayscale-0 transition-all border-b-4 border-red-600"></div>
                            <h3 class="mt-4 text-sm font-bold uppercase">${m.name}</h3>
                            <p class="text-xs text-red-500">${m.role}</p>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
