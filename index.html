<!-- Members Section -->
<section id="band" class="max-w-5xl mx-auto py-16 px-6">
    <h2 class="text-3xl font-bold mb-10 border-l-4 border-red-700 pl-4">Members</h2>
    <div id="members-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- JS will inject cards here -->
    </div>
</section>

<script>
    fetch('members.json')
        .then(response => response.json())
        .then(data => {
            const grid = document.getElementById('members-grid');
            data.forEach(member => {
                const card = `
                    <div class="bg-gray-900 p-6 rounded-lg border border-gray-800 text-center">
                        <div class="w-24 h-24 bg-gray-700 rounded-full mb-4 mx-auto"></div>
                        <h3 class="text-xl font-bold">${member.name}</h3>
                        <p class="text-red-500 text-sm uppercase">${member.role}</p>
                    </div>
                `;
                grid.innerHTML += card;
            });
        });
</script>
