<!DOCTYPE html>
<html lang="pt" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); }
        @keyframes stretch { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .animate-stretch { animation: stretch 4s ease-in-out infinite; }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Language Toggle -->
    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="setLanguage('pt')" class="bg-gray-800 px-3 py-1 text-sm flex items-center gap-2 hover:bg-red-600 transition-all">🇵🇹 PT</button>
        <button onclick="setLanguage('en')" class="bg-gray-800 px-3 py-1 text-sm flex items-center gap-2 hover:bg-red-600 transition-all">🇬🇧 EN</button>
    </div>

    <!-- Hero Section -->
    <section class="relative h-screen flex items-end justify-center pb-20">
        <div class="absolute inset-0 bg-gray-900 bg-cover bg-center" style="background-image: url('images/IMG_0032.png');"></div>
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="relative z-10 text-center px-4">
            <img src="images/Logo_Abutre_Vetores-03.png" alt="Abutre Logo" class="max-w-md md:max-w-xl mx-auto drop-shadow-2xl animate-stretch">
            <p id="hero-subtitle" class="text-xl tracking-[0.5em] uppercase text-white mt-8">Heavy Metal Tradicional</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 -mt-20 relative z-20">
        <div class="grid md:grid-cols-3 gap-6">
            <!-- Upcoming Rituals -->
            <div class="md:col-span-2 bg-gray-900 border border-gray-700 p-8 hover:border-red-600 transition-all">
                <h2 id="ritual-title" class="text-3xl font-bold uppercase mb-6 border-b border-gray-700 pb-2">Próximos Rituais</h2>
                <div id="tour-list" class="text-gray-400"><p id="no-dates">Nenhuma data agendada.</p></div>
            </div>

            <!-- Latest Release -->
            <div class="bg-red-900 p-8 text-white flex flex-col justify-center items-center text-center">
                <h3 id="release-title" class="text-2xl font-bold uppercase mb-4">Último Lançamento</h3>
                <img src="images/IMG_0036.jpeg" alt="Demo MMXXV" class="w-32 h-32 mb-4 border-2 border-white shadow-lg">
                <a id="listen-btn" href="https://abutremetal.bandcamp.com/album/demo-mmxxv" target="_blank" class="bg-black px-6 py-2 uppercase tracking-widest font-bold hover:bg-white hover:text-black transition-all">Ouvir Agora</a>
            </div>
        </div>

        <!-- Latest Clips Section -->
        <section class="py-20">
            <h2 id="clips-title" class="text-4xl font-bold uppercase mb-12 text-center">Últimos Videoclipes</h2>
            <div class="max-w-4xl mx-auto space-y-16">
                <!-- Clip 1 -->
                <div class="text-center">
                    <h3 class="text-2xl font-bold uppercase mb-4">Abutre - Eterno Combate</h3>
                    <a href="https://youtu.be/EnX9IIWFbus" target="_blank" class="block w-full aspect-video bg-gray-800 hover:opacity-80 transition-opacity border-2 border-transparent hover:border-red-600 relative">
                        <img src="https://i.ytimg.com/vi/EnX9IIWFbus/sddefault.jpg" alt="Abutre - Eterno Combate" class="w-full h-full object-cover">
                        <div class="absolute inset-0 flex items-center justify-center"><span class="watch-btn bg-black/70 px-6 py-3 uppercase font-bold text-lg">Assistir no YouTube</span></div>
                    </a>
                </div>
                <!-- Clip 2 -->
                <div class="text-center">
                    <h3 class="text-2xl font-bold uppercase mb-4">Abutre - Toda a Luz o Tempo Apaga</h3>
                    <a href="https://youtu.be/D8tyopJ6U1U" target="_blank" class="block w-full aspect-video bg-gray-800 hover:opacity-80 transition-opacity border-2 border-transparent hover:border-red-600 relative">
                        <img src="https://i.ytimg.com/vi/D8tyopJ6U1U/sddefault.jpg" alt="Abutre - Toda a Luz o Tempo Apaga" class="w-full h-full object-cover">
                        <div class="absolute inset-0 flex items-center justify-center"><span class="watch-btn bg-black/70 px-6 py-3 uppercase font-bold text-lg">Assistir no YouTube</span></div>
                    </a>
                </div>
            </div>
        </section>

        <!-- The Lineup -->
        <section class="py-20">
            <h2 id="lineup-title" class="text-4xl font-bold uppercase mb-12 text-center">Formação</h2>
            <div id="members-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-gray-800 text-center">
        <div class="flex justify-center gap-8 mb-8">
            <a href="https://www.facebook.com/profile.php?id=61581720787540" target="_blank" class="flex items-center gap-2 hover:text-red-600 transition-colors">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874V12h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> Facebook
            </a>
            <a href="https://www.instagram.com/abutremetal/" target="_blank" class="flex items-center gap-2 hover:text-red-600 transition-colors">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.77 1.683 4.918 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.918 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.012-3.584.07-4.849.148-3.259 1.664-4.77 4.919-4.918 1.265-.058 1.645-.07 4.849-.07zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg> Instagram
            </a>
            <a href="https://www.youtube.com/@AbutreMetalBand" target="_blank" class="flex items-center gap-2 hover:text-red-600 transition-colors">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg> YouTube
            </a>
        </div>
        <p class="text-gray-500 text-sm">© 2026 Abutre. Developed by Ivan Frias.</p>
    </footer>

    <script>
        const translations = {
            pt: { hero: "Heavy Metal Tradicional", ritual: "Próximos Rituais", release: "Último Lançamento", listen: "Ouvir Agora", clips: "Últimos Videoclipes", watch: "Assistir no YouTube", lineup: "Formação", noDates: "Nenhuma data agendada." },
            en: { hero: "Traditional Heavy Metal", ritual: "Upcoming Rituals", release: "Latest Release", listen: "Listen Now", clips: "Latest Video Clips", watch: "Watch on YouTube", lineup: "The Lineup", noDates: "No upcoming dates scheduled." }
        };

        function setLanguage(lang) {
            document.getElementById('hero-subtitle').innerText = translations[lang].hero;
            document.getElementById('ritual-title').innerText = translations[lang].ritual;
            document.getElementById('release-title').innerText = translations[lang].release;
            document.getElementById('listen-btn').innerText = translations[lang].listen;
            document.getElementById('clips-title').innerText = translations[lang].clips;
            document.getElementById('lineup-title').innerText = translations[lang].lineup;
            document.getElementById('no-dates').innerText = translations[lang].noDates;
            document.querySelectorAll('.watch-btn').forEach(el => el.innerText = translations[lang].watch);
        }

        fetch('data/members.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('members-grid');
                grid.innerHTML = '';
                data.forEach(m => {
                    grid.innerHTML += `<div class="group cursor-pointer"><div class="w-full h-64 bg-gray-800 grayscale group-hover:grayscale-0 transition-all border-b-4 border-red-600"></div><h3 class="mt-4 text-sm font-bold uppercase">${m.name}</h3><p class="text-xs text-red-500">${m.role}</p></div>`;
                });
            })
            .catch(err => console.error('Error loading members:', err));
    </script>
</body>
</html>
