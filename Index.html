<!DOCTYPE html>
<html lang="en" class="bg-black text-gray-100">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Abutre | Heavy Metal Portugal</title>
</head>
<body class="font-sans">

    <!-- Hero / Header -->
    <header class="py-20 text-center border-b border-gray-800">
        <h1 class="text-6xl font-bold tracking-tighter uppercase">Abutre</h1>
        <p class="text-gray-400 mt-4">Traditional Heavy Metal from Portugal</p>
    </header>

    <!-- Biographies Section -->
    <section id="band" class="max-w-5xl mx-auto py-16 px-6">
        <h2 class="text-3xl font-bold mb-10 border-l-4 border-red-700 pl-4">Members</h2>
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Member Card -->
            <div class="bg-gray-900 p-6 rounded-lg border border-gray-800">
                <div class="w-24 h-24 bg-gray-700 rounded-full mb-4 mx-auto"></div> <!-- Image Placeholder -->
                <h3 class="text-xl font-bold text-center">Name</h3>
                <p class="text-red-500 text-center text-sm mb-4 uppercase">Role</p>
                <p class="text-gray-400 text-sm leading-relaxed">Biography text goes here...</p>
            </div>
        </div>
    </section>

    <!-- Discography Section -->
    <section id="music" class="bg-zinc-950 py-16 px-6">
        <div class="max-w-5xl mx-auto">
            <h2 class="text-3xl font-bold mb-10 border-l-4 border-red-700 pl-4">Discography</h2>
            <div class="flex items-start gap-8 border-b border-gray-800 pb-8">
                <img src="album-cover.jpg" alt="Demo MMXXV" class="w-48 h-48 bg-gray-800">
                <div>
                    <h3 class="text-2xl font-bold">Demo MMXXV (2025)</h3>
                    <ul class="text-gray-400 mt-2 space-y-1">
                        <li>1. Track Title</li>
                        <li>2. Track Title</li>
                    </ul>
                    <a href="#" class="inline-block mt-4 text-red-500 hover:text-red-400 font-bold">Listen on Spotify →</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Concerts Section -->
    <section id="tour" class="max-w-5xl mx-auto py-16 px-6">
        <h2 class="text-3xl font-bold mb-10 border-l-4 border-red-700 pl-4">Upcoming Rituals</h2>
        <table class="w-full text-left">
            <tr class="border-b border-gray-800 text-gray-500">
                <th class="py-4">Date</th>
                <th class="py-4">Venue</th>
                <th class="py-4">Location</th>
                <th class="py-4">Tickets</th>
            </tr>
            <tr class="border-b border-gray-800">
                <td class="py-4 font-mono">2026-07-15</td>
                <td class="py-4 font-bold">Example Venue</td>
                <td class="py-4">Ourém, PT</td>
                <td class="py-4"><a href="#" class="bg-red-700 px-4 py-1 rounded text-sm hover:bg-red-600">GET TICKETS</a></td>
            </tr>
        </table>
    </section>

</body>
</html>
