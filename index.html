<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%); }
        
        @keyframes stretch {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-stretch {
            animation: stretch 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Hero Section -->
    <section class="relative h-screen flex items-end justify-center pb-20">
        <div class="absolute inset-0 bg-gray-900 bg-cover bg-center" style="background-image: url('images/IMG_0032.png');"></div>
        <div class="absolute inset-0 hero-gradient"></div>
        
        <div class="relative z-10 text-center px-4">
            <img src="images/Logo_Abutre_Vetores-03.png" alt="Abutre Logo" class="max-w-md md:max-w-xl mx-auto drop-shadow-2xl animate-stretch">
            <p class="text-xl tracking-[0.5em] uppercase text-white mt-8">Traditional Heavy Metal</p>
        </div>
    </section>

    <!-- Main Content Grid -->
    <main class="max-w-6xl mx-auto px-6 -mt-20 relative z-20">
        <div class="grid md:grid-cols-3 gap-6">
            
            <!-- Upcoming Rituals -->
            <div class="md:col-span-2 bg-gray-900 border border-gray-700 p-8 hover:border-red-600 transition-all">
                <h2 class="text-3xl font-bold uppercase mb-6 border-b border-gray-700 pb-2">Upcoming Rituals</h2>
                <div id="tour-list" class="text-gray-400">
                    <p>No upcoming dates scheduled.</p>
                </div>
            </div>

            <!-- Latest Release with demo cover: IMG_0036.png -->
            <div class="bg-red-900 p-8 text-white flex flex-col justify-center items-center text-center">
                <h3 class="text-2xl font-bold uppercase mb-4">Latest Release</h3>
                <img src="images/IMG_0036.jpeg" alt="Demo MMXXV Cover" class="w-32 h-32 mb-4 border-2 border-white shadow-lg">
                <a href="https://abutremetal.bandcamp.com/album/demo-mmxxv" target="_blank" class="bg-black px-6 py-2 uppercase tracking-widest font-bold hover:bg-white hover:text-black transition-all">Listen Now</a>
            </div>
        </div>

        <!-- The Lineup -->
        <section class="py-20">
            <h2 class="text-4xl font-bold uppercase mb-12 text-center">The Lineup</h2>
            <div id="members-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6">
                <!-- Data injected by script -->
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script>
        fetch('data/members.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('members-grid');
                grid.innerHTML = '';
                data.forEach(m => {
                    grid.innerHTML += `
                        <div class="group cursor-pointer">
                            <div class="w-full h-64 bg-gray-800 grayscale group-hover:grayscale-0 transition-all border-b-4 border-red-600"></div>
                            <h3 class="mt-4 text-sm font-bold uppercase">${m.name}</h3>
                            <p class="text-xs text-red-500">${m.role}</p>
                        </div>
                    `;
                });
            })
            .catch(err => console.error('Error loading members:', err));
    </script>
</body>
</html>
